# /www/server/panel/vhost/nginx/dashboard.voxbulk.com.conf
# Clinic dashboard — TanStack Start SSR via vite preview on 127.0.0.1:5175
# Browser calls https://api.voxbulk.com directly (CORS on API).
#
# IMPORTANT: The NEW dashboard (beige + indigo shadcn UI) is NOT a static SPA.
# Do NOT serve /www/wwwroot/dashboard.voxbulk.com — that folder holds the OLD orange theme.

server
{
    listen 80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen [::]:80;
    server_name dashboard.voxbulk.com;

    include /www/server/panel/vhost/nginx/well-known/dashboard.voxbulk.com.conf;

    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    ssl_certificate    /www/server/panel/vhost/cert/dashboard.voxbulk.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/dashboard.voxbulk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;

    error_page 404 /404.html;
    error_page 502 /502.html;

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:5175;
    }

    access_log  /www/wwwlogs/dashboard.voxbulk.com.log;
    error_log   /www/wwwlogs/dashboard.voxbulk.com.error.log;
}
