# Full vhost — paste ALL of this into Baota:
# Website → driver.yallasay.com → Config → replace entire file → Save → nginx -t

server {
    listen 80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen [::]:80;
    server_name driver.yallasay.com;
    index index.html;
    root /www/wwwroot/driver.yallasay.com;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/driver.yallasay.com.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    ssl_certificate    /www/server/panel/vhost/cert/driver.yallasay.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/driver.yallasay.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;
    #SSL-END

    error_page 404 /404.html;
    error_page 502 /502.html;

    # NO PHP — static Vite SPA only (do not include enable-php-83.conf)

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$") {
        return 403;
    }

    # Driver API — must be before location /
    location ^~ /abuu/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host api.voxbulk.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|ico|webp|svg)$ {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css|woff2?|ttf|eot)$ {
        expires 12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/driver.yallasay.com.log;
    error_log /www/wwwlogs/driver.yallasay.com.error.log;
}
