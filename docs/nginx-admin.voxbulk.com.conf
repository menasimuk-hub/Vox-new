# /www/server/panel/vhost/nginx/admin.voxbulk.com.conf
# Static SPA: /www/wwwroot/admin.voxbulk.com
# API: browser → https://admin.voxbulk.com/api/* → nginx → uvicorn :8000

server
{
    listen 80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen [::]:80;
    server_name admin.voxbulk.com;
    index index.html;
    root /www/wwwroot/admin.voxbulk.com;

    include /www/server/panel/vhost/nginx/well-known/admin.voxbulk.com.conf;

    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    ssl_certificate    /www/server/panel/vhost/cert/admin.voxbulk.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/admin.voxbulk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;

    error_page 404 /404.html;
    error_page 502 /502.html;

    # NO PHP on this site (static only).

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    # ── API proxy (MUST be before location /) ──
    # App calls: https://admin.voxbulk.com/api/admin/...
    # NEVER add location ^~ /admin here — breaks React UI routes.
    location ^~ /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host api.voxbulk.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|ico|webp|svg)$ {
        expires 30d;
        access_log off;
    }

    location ~ .*\.(js|css|woff2?|ttf|eot)$ {
        expires 12h;
        access_log off;
    }

    access_log  /www/wwwlogs/admin.voxbulk.com.log;
    error_log   /www/wwwlogs/admin.voxbulk.com.error.log;
}
