# /www/server/panel/vhost/nginx/voxbulk.com.conf
# Public site = TanStack Start (NOT static files). nginx → vite preview :5173
# Started by: cd /www/voxbulk && ./vox.sh restart

server
{
    listen 80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen [::]:80;
    server_name voxbulk.com www.voxbulk.com;
    index index.html;

    include /www/server/panel/vhost/nginx/well-known/voxbulk.com.conf;

    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    ssl_certificate    /www/server/panel/vhost/cert/voxbulk.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/voxbulk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    # TanStack app — proxy to vite preview (NOT empty wwwroot)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    access_log  /www/wwwlogs/voxbulk.com.log;
    error_log   /www/wwwlogs/voxbulk.com.error.log;
}
