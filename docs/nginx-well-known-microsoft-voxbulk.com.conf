# Paste into Baota vhost OR save as well-known include.
# Exact match for Microsoft — do NOT use "location ~ \.well-known { allow all; }" (404/301).

location = /.well-known/microsoft-identity-association.json {
    alias /www/wwwroot/voxbulk.com/.well-known/microsoft-identity-association.json;
    default_type application/json;
    allow all;
}

location ^~ /.well-known/ {
    root /www/wwwroot/voxbulk.com;
    default_type application/json;
    allow all;
}
