# Baota / aaPanel optional snippet — only needed if your live vhost still has the old
# "location ~ \.well-known { allow all; }" block that returns 404.
#
# Preferred: replace the server block using docs/nginx-voxbulk.com.conf (includes alias below).
#
# Manual apply on VPS:
#   sudo cp docs/nginx-well-known-microsoft-voxbulk.com.conf \
#     /www/server/panel/vhost/nginx/well-known/voxbulk.com-microsoft.conf
#   sudo nginx -t && sudo nginx -s reload
#
# Then deploy copies the JSON file:
#   cd /www/voxbulk && git pull origin main && ./deploy-vps.sh

location ^~ /.well-known/ {
    alias /www/wwwroot/voxbulk.com/.well-known/;
    default_type application/json;
    add_header Cache-Control "public, max-age=300";
    allow all;
}
