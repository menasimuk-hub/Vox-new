<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VoxBulk AI Voice Screening</title>
    <link rel="stylesheet" href="css/widget.css" />
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="hdr">
        <div class="brand">VoxBulk</div>
        <div class="sub">AI Voice Screening</div>
      </header>

      <section id="main" class="card">
        <div id="candBox" class="cand">
          <div class="muted">Loading candidate…</div>
        </div>
        <p class="muted">
          Run full interviews in VoxBulk Dashboard (AI questions, email CV, ATS, AI calls). Results write
          back to this Zoho Candidate as Notes.
        </p>
        <div class="row">
          <a id="openDash" class="btn primary" href="https://dashboard.voxbulk.com/interviews/new" target="_blank" rel="noopener">
            Open VoxBulk
          </a>
        </div>
        <div id="status" class="status muted"></div>
      </section>
    </div>
    <script src="js/widget.js"></script>
  </body>
</html>
