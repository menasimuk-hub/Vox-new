<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>VoxBulk — App Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <script>
      (function () {
        var raw = window.location.hash || '';
        if (!raw || raw.length <= 1) return;
        try {
          var q = raw.charAt(0) === '#' ? raw.slice(1) : raw;
          var params = new URLSearchParams(q);
          var token = params.get('access_token');
          if (!token) return;
          localStorage.setItem('retover_access_token', token);
          localStorage.setItem('access_token', token);
          var org = params.get('org_id');
          var user = params.get('user_id');
          if (org) localStorage.setItem('retover_org_id', org);
          if (user) localStorage.setItem('retover_user_id', user);
          history.replaceState(null, '', window.location.pathname + window.location.search);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
