<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOXBULK Admin UI</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Strip one-time public→admin auth handoff before React loads. -->
    <script>
      (function () {
        try {
          var raw = window.location.hash;
          if (!raw || raw.length <= 1) return;
          var q = raw.charAt(0) === '#' ? raw.slice(1) : raw;
          var params = new URLSearchParams(q);
          var token = params.get('access_token');
          if (!token) return;
          localStorage.setItem('retover_admin_access_token', token);
          localStorage.setItem('access_token', token);
          localStorage.setItem('retover_access_token', token);
          var oid = params.get('org_id');
          var uid = params.get('user_id');
          if (oid) localStorage.setItem('retover_org_id', oid);
          if (uid) localStorage.setItem('retover_user_id', uid);
          window.history.replaceState(window.history.state || null, '', window.location.pathname + window.location.search);
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body><div id="root"></div></body>
</html>
