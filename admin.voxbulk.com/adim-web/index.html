<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOXBULK Admin UI</title>
    <link rel="icon" type="image/svg+xml" href="/brand/icon-black.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <!-- Strip one-time public→admin auth handoff before React loads. -->
    <script>
      (function () {
        try {
          var raw = window.location.hash;
          if (!raw || raw.length <= 1) return;
          var q = raw.charAt(0) === '#' ? raw.slice(1) : raw;
          var params = new URLSearchParams(q);
          var token = params.get('access_token');
          if (!token) return;
          localStorage.setItem('voxbulk_admin_access_token', token);
          localStorage.setItem('access_token', token);
          localStorage.setItem('voxbulk_access_token', token);
          var oid = params.get('org_id');
          var uid = params.get('user_id');
          if (oid) localStorage.setItem('voxbulk_org_id', oid);
          if (uid) localStorage.setItem('voxbulk_user_id', uid);
          window.history.replaceState(window.history.state || null, '', window.location.pathname + window.location.search);
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="toast-container"></div>
  </body>
</html>
